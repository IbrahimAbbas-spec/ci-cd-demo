<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CI/CD Jenkins Demo</title>
<style>
/* Minimal, modern card-style layout */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
Roboto, Helvetica, Arial, sans-serif;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%);
color: #1f2937;
padding: 24px;
}
.card {
background: #ffffff;
border-radius: 16px;
padding: 48px 56px;
box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
max-width: 560px;
width: 100%;
}
.badge {
display: inline-block;
background: #dcfce7;
color: #166534;
font-size: 12px;
font-weight: 600;
padding: 4px 10px;
border-radius: 999px;
letter-spacing: 0.5px;
text-transform: uppercase;
}
h1 {
font-size: 32px;
font-weight: 700;
margin: 16px 0 8px;
color: #111827;
}
.subtitle {
color: #6b7280;
font-size: 16px;
margin-bottom: 32px;
}
.meta {
border-top: 1px solid #e5e7eb;
padding-top: 24px;
display: grid;
gap: 16px;
}
.meta-row {
display: flex;
justify-content: space-between;
align-items: center;
}
.meta-key {
font-size: 13px;
color: #6b7280;
text-transform: uppercase;
letter-spacing: 0.5px;
}
.meta-val {
font-family: "SF Mono", Menlo, Consolas, monospace;
font-size: 14px;
color: #111827;
background: #f3f4f6;
padding: 4px 10px;
border-radius: 6px;
}
.footer {
margin-top: 32px;
font-size: 13px;
color: #9ca3af;
text-align: center;
}
</style>
</head>
<body>
<div class="card">
  <span class="badge">● Deployed</span>
  <h1>CI/CD Jenkins Demo</h1>
  <p class="subtitle">
    Built, tested, and deployed automatically by Jenkins.
  </p>
  <div class="meta">
    <div class="meta-row">
      <span class="meta-key">Build number</span>
      <span class="meta-val">{{ build_number }}</span>
    </div>
    <div class="meta-row">
      <span class="meta-key">Container hostname</span>
      <span class="meta-val">{{ hostname }}</span>
    </div>
    <div class="meta-row">
      <span class="meta-key">Deployed at</span>
      <span class="meta-val">{{ deployed_at }}</span>
    </div>
  </div>
  <p class="footer">Flask · Docker · Jenkins</p>
</div>
</body>
</html>
